<!DOCTYPE html>
<html>
<head>
  <title>HR Policy Library</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    h1 {
      background: #1f4e79;
      color: white;
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    a {
      text-decoration: none;
      color: #1f4e79;
      font-weight: bold;
    }

  </style>

</head>
<body>

<h1>📂 Company Policy Documents</h1>

<div class="container">
  <div id="fileList"></div>
</div>

<script>

const files = [
  "2026-03-30-JD-Admin-AGM.docx.pdf",
  "Apartment Booking Policy.docx.pdf",
  "HRM-POL-LDC-25-165-Canteen Management Policy.docx.pdf"
];

const folder = "Test PDF/";

const list = document.getElementById("fileList");

files.forEach(file => {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    📄 <a href="${folder + file}" target="_blank">
      ${file}
    </a>
  `;

  list.appendChild(div);

});

</script>

</body>
</html>
